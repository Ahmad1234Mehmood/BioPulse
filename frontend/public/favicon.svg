<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark glassmorphic background to match the topbar icon container -->
  <rect x="2" y="2" width="28" height="28" rx="8" fill="#0b0f19" stroke="#4f46e5" stroke-width="2" />
  
  <!-- Face icon drawing inside, matching the Material Symbols "face" outline style in indigo-400 -->
  <circle cx="16" cy="16" r="8" stroke="#818cf8" stroke-width="2" fill="none" />
  <!-- Left Eye -->
  <circle cx="13" cy="14" r="1.2" fill="#818cf8" />
  <!-- Right Eye -->
  <circle cx="19" cy="14" r="1.2" fill="#818cf8" />
  <!-- Mouth (Smile) -->
  <path d="M12,18 C13,20.5 19,20.5 20,18" stroke="#818cf8" stroke-width="2" stroke-linecap="round" fill="none" />
</svg>
